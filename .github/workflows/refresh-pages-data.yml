name: Refresh GitHub Pages data

on:
  workflow_dispatch:
  schedule:
    # Daily at 3:22 AM America/Chicago during daylight saving time.
    - cron: "22 8 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Download latest Chicago permits data
        env:
          CHI_SOCRATA_APP_TOKEN: ${{ secrets.CHI_SOCRATA_APP_TOKEN }}
        run: uv run chi-permits init

      - name: Export static Pages indexes and license registries
        run: uv run chi-permits export-static

      - name: Run data accuracy check
        run: uv run python scripts/accuracy_check.py

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh Chicago permits static data
          file_pattern: docs/data/*.json
