name: Refresh GitHub Pages data

on:
  workflow_dispatch:
  schedule:
    # Daily at 12:00 AM, 6:00 AM, and 12:00 PM America/Chicago.
    # GitHub cron is UTC-only, so schedule both DST and standard-time hours.
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-pages-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check Chicago refresh schedule
        id: chicago_refresh
        shell: bash
        run: |
          should_run=true
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            should_run=false
            chicago_hour="$(TZ=America/Chicago date +%H)"
            if [[ "$chicago_hour" == "00" || "$chicago_hour" == "06" || "$chicago_hour" == "12" ]]; then
              should_run=true
            fi
          fi
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.chicago_refresh.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Install uv
        if: steps.chicago_refresh.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        if: steps.chicago_refresh.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.chicago_refresh.outputs.should_run == 'true'
        run: uv sync

      - name: Download latest Chicago permits data
        if: steps.chicago_refresh.outputs.should_run == 'true'
        env:
          CHI_SOCRATA_APP_TOKEN: ${{ secrets.CHI_SOCRATA_APP_TOKEN }}
        run: uv run chi-permits init

      - name: Export static Pages indexes and license registries
        if: steps.chicago_refresh.outputs.should_run == 'true'
        run: uv run chi-permits export-static

      - name: Run data accuracy check
        if: steps.chicago_refresh.outputs.should_run == 'true'
        run: uv run python scripts/accuracy_check.py

      - name: Commit refreshed data
        if: steps.chicago_refresh.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh Chicago permits static data
          file_pattern: docs/data/*.json docs/data/**/*.json
